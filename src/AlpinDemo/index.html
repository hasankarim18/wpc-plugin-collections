<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpine Demo</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="//unpkg.com/alpinejs" defer></script>
  </head>
  <body>
    <!-- #dynamic list -->

    <div
      x-data="{items:['Apple', 'Banana', 'Orange'], newItem :'' }"
      class="dynamic_list container"
    >
      <h3>Dynamic Lists</h3>
      <div class="dynamic_inputs">
        <!-- <span style="color: #fff" x-text="newItem"></span> <br /> -->
        <input
          type="text"
          x-model="newItem"
          placeholder="Add new item"
          @keyup.enter="items.push(newItem);newItem = ''"
        />
        <button type="text" @click="items.push(newItem); newItem=''">
          Add Item
        </button>
      </div>
      <div class="dynamic_lists_loop">
        <template x-for="(item, index) in items" :key="index">
          <div class="list_item">
            <span x-text="item"></span>
            <button @click="items.splice(index, 1)">Remove</button>
          </div>
        </template>
      </div>
    </div>

    <!-- Example 2 Init function timer -->

    <div class="example container" x-data="timer" x-init="init()">
      <h3>Real time clock</h3>
      <p>Current time: <span x-text="time"></span></p>
    </div>
    <script>
      const timer = {
        time: "",
        updateTime() {
          this.time = new Date().toLocaleTimeString();
        },
        init() {
          this.updateTime();
          setInterval(() => this.updateTime(), 1000); // runs after 1000ms which is 1s
        },
      };
    </script>
  </body>
</html>
